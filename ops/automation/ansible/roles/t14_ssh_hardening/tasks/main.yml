---
- name: Optionally harden SSH server config
  when: lab-node-01_harden_ssh | bool
  block:
    - name: Ensure PasswordAuthentication is set
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^\s*PasswordAuthentication\s+'
        line: "PasswordAuthentication {{ lab-node-01_sshd_password_authentication }}"
        create: false
      notify: Restart ssh

    - name: Ensure PermitRootLogin is set
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^\s*PermitRootLogin\s+'
        line: "PermitRootLogin {{ lab-node-01_sshd_permit_root_login }}"
        create: false
      notify: Restart ssh

