---
- name: Skip k3s installation unless opted-in
  when: not (t14_install_k3s | bool)
  ansible.builtin.debug:
    msg: "k3s install is disabled (t14_install_k3s=false)."

- name: Install k3s (lightweight Kubernetes)
  when: t14_install_k3s | bool
  block:
    - name: Build k3s install flags
      ansible.builtin.set_fact:
        _k3s_exec_flags: >-
          {{ '--disable=traefik' if t14_k3s_disable_traefik | bool else '' }}
          {{ t14_k3s_extra_flags | default('') }}

    - name: Download and run k3s installer
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="{{ _k3s_exec_flags | trim }}" sh -
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for k3s to be ready
      ansible.builtin.command: k3s kubectl get nodes
      register: _k3s_nodes
      retries: 15
      delay: 5
      until: _k3s_nodes.rc == 0
      changed_when: false

    - name: Copy kubeconfig to operator home
      when: t14_k3s_write_kubeconfig | bool
      block:
        - name: Ensure .kube directory exists
          ansible.builtin.file:
            path: "/home/{{ ansible_user_id }}/.kube"
            state: directory
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            mode: "0700"

        - name: Copy k3s.yaml to ~/.kube/config
          ansible.builtin.copy:
            src: /etc/rancher/k3s/k3s.yaml
            dest: "/home/{{ ansible_user_id }}/.kube/config"
            remote_src: true
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            mode: "0600"
