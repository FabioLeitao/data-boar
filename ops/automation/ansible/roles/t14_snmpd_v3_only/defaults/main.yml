---
# SNMP daemon is opt-in (network-facing). Keep disabled by default.
lab-node-01_snmpd_enable: false

# Install packages even when disabled (optional). Default false to avoid surprises.
lab-node-01_snmpd_install: false

# Listen address. Keep localhost unless you explicitly set a LAN interface/IP.
lab-node-01_snmpd_agent_address: "udp:127.0.0.1:161,udp6:[::1]:161"

# Views are safe defaults; credentials must be provided out-of-band (docs/private).
lab-node-01_snmpd_syslocation: "LAB-OP"
lab-node-01_snmpd_syscontact: "operator"

# NOTE: For v3-only, define at least one user. Do NOT store auth/priv passwords in tracked files.
# Provide these via inventory/group_vars kept private, or via Ansible Vault on your machine.
lab-node-01_snmpd_v3_users: []
# Example shape (DO NOT commit real secrets):
# lab-node-01_snmpd_v3_users:
#   - username: "snmpv3user"
#     authproto: "SHA"    # SHA|MD5 (prefer SHA)
#     authpass: "CHANGE_ME"
#     privproto: "AES"    # AES|DES (prefer AES)
#     privpass: "CHANGE_ME"
#     level: "authPriv"   # authPriv|authNoPriv

