---
# /etc/login.defs — umask + password aging + hash parameters (LAB-OP defaults).
lab-node-01_login_defs_enable: true

lab-node-01_login_umask: "027"

# HOME_MODE for new home dirs (useradd/newusers).
lab-node-01_login_defs_home_mode: "0750"

# Password aging (shadow/login.defs).
lab-node-01_login_defs_pass_max_days: "99990"
lab-node-01_login_defs_pass_min_days: "1"
lab-node-01_login_defs_pass_warn_age: "14"

# Fallback if PAM does not enforce (see login.defs(5)).
lab-node-01_login_defs_login_retries: "5"

# Hash algorithm for new/changed passwords (must align with PAM if you change it).
lab-node-01_login_defs_encrypt_method: "SHA512"

# Stretching for SHA256/SHA512 crypt (libc range).
lab-node-01_login_defs_sha_crypt_min_rounds: "6000"
lab-node-01_login_defs_sha_crypt_max_rounds: "60000"
