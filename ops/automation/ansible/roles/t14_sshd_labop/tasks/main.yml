---
- name: Skip sshd LAB-OP drop-in
  when: not (lab-node-01_sshd_labop_enable | bool)
  ansible.builtin.debug:
    msg: "sshd LAB-OP drop-in disabled (lab-node-01_sshd_labop_enable=false)."

- name: Apply sshd LAB-OP drop-in
  when: lab-node-01_sshd_labop_enable | bool
  block:
    - name: Stat banner file for optional Banner directive
      ansible.builtin.stat:
        path: "{{ lab-node-01_sshd_banner_path }}"
      register: lab-node-01_sshd_banner_stat

    - name: Render sshd drop-in configuration
      ansible.builtin.template:
        src: sshd_labop.conf.j2
        dest: "{{ lab-node-01_sshd_labop_dropin_path }}"
        owner: root
        group: root
        mode: "0644"
      vars:
        lab-node-01_sshd_banner_exists: "{{ lab-node-01_sshd_banner_stat.stat.exists | default(false) }}"
      notify: Restart ssh

    - name: Validate sshd configuration before restart
      ansible.builtin.command: sshd -t
      changed_when: false
