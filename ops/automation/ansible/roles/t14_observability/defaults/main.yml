---
# --- CLI tools ---
lab-node-01_obs_install_cli_tools: true
# ctop is not in apt; install via binary download.
lab-node-01_obs_install_ctop: true
lab-node-01_obs_ctop_version: "0.7.7"

# --- Syslog forwarding ---
lab-node-01_obs_syslog_forward_enabled: false
# Set this to your Graylog/syslog server IP (keep real IPs in docs/private/).
lab-node-01_obs_syslog_server_ip: ""
lab-node-01_obs_syslog_port: 514
lab-node-01_obs_syslog_protocol: "udp"   # "udp" or "tcp"

# --- Munin node ---
lab-node-01_obs_munin_node_enabled: true
# List of IPs allowed to scrape munin-node (Munin master addresses).
lab-node-01_obs_munin_allowed_ips: []   # e.g. ["10.0.1.10"]

# --- Monit ---
lab-node-01_obs_monit_enabled: true
lab-node-01_obs_monit_web_enabled: false
lab-node-01_obs_monit_web_port: 2812
lab-node-01_obs_monit_web_user: "admin"
lab-node-01_obs_monit_web_password: "changeme_in_vault"

# --- Prometheus node_exporter ---
lab-node-01_obs_node_exporter_enabled: true
lab-node-01_obs_node_exporter_ufw_allow_from: "10.0.0.0/16"

# --- Wazuh agent ---
lab-node-01_obs_wazuh_agent_enabled: false
lab-node-01_obs_wazuh_manager_ip: ""   # real IP in docs/private/; do NOT commit
lab-node-01_obs_wazuh_version: "4"     # major version for apt repo
