---
- name: Ensure fail2ban package is installed
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: false

# When D-Bus is unreachable, ansible.builtin.service still shells out to systemctl and fails.
# Try the module first; on failure, enable/start without systemctl (SysV script or fail2ban-client).
- name: Ensure fail2ban is enabled and running
  when: lab-node-01_fail2ban_enable | bool
  block:
    - name: Try Ansible service module (needs working system D-Bus for systemd backend)
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true
      register: lab-node-01_fail2ban_service
      ignore_errors: true

    - name: Enable and start fail2ban without systemctl (when D-Bus is unavailable)
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -x /etc/init.d/fail2ban ]; then
          update-rc.d fail2ban defaults 2>/dev/null || true
          /etc/init.d/fail2ban start
        else
          fail2ban-client start || true
        fi
      args:
        executable: /bin/bash
      when: lab-node-01_fail2ban_service is failed
      changed_when: true
      failed_when: false

    - name: Note when fail2ban fell back past systemctl
      ansible.builtin.debug:
        msg: >-
          fail2ban: systemd/D-Bus was unavailable for Ansible; started via SysV or fail2ban-client.
          When D-Bus is healthy, re-run or run: sudo systemctl enable --now fail2ban
      when: lab-node-01_fail2ban_service is failed

- name: Configure fail2ban jail (SSH only, conservative)
  when: lab-node-01_fail2ban_enable | bool
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/99-ssh-local.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [DEFAULT]
      # LAB-OP pattern: keep LAN trusted by ignoreip if you confirm.
      # To adopt, set `lab-node-01_fail2ban_ignoreip` in inventory (e.g. ["127.0.0.1/8","::1","192.0.2.0/24"]).
      {% if lab-node-01_fail2ban_ignoreip | length > 0 %}
      ignoreip = {{ lab-node-01_fail2ban_ignoreip | join(' ') }}
      {% endif %}

      [sshd]
      enabled = {{ 'true' if (lab-node-01_fail2ban_sshd_enabled | bool) else 'false' }}
      maxretry = {{ lab-node-01_fail2ban_maxretry }}
      findtime = {{ lab-node-01_fail2ban_findtime }}
      bantime = {{ lab-node-01_fail2ban_bantime }}
      banaction = {{ lab-node-01_fail2ban_banaction }}
  notify: Restart fail2ban
