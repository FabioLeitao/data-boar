---
# Add ansible_user (+ extras) to standard supplementary groups for workstation/lab operation.
lab-node-01_operator_groups_enabled: true

# tshark pulls wireshark-common — creates group `wireshark` so capture works without root (with group membership + re-login).
lab-node-01_operator_install_tshark: true

# Always applied when enabled (docker / wireshark are added in tasks when Docker CE / tshark are enabled).
lab-node-01_operator_supplementary_group_names:
  - dialout
  - plugdev
  - systemd-journal

# Extra group names (kvm, libvirt, …) — only if those groups already exist on the host (install qemu/libvirt first).
lab-node-01_operator_supplementary_group_names_extra: []

# Extra usernames besides ansible_user.
lab-node-01_operator_group_users_extra: []
