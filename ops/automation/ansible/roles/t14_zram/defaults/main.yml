---
# Enable zram-based swap (systemd-zram-generator). Safe default: off.
lab-node-01_zram_enable: false

# Sizing policy (computed from ansible facts):
# - size_percent: percent of total RAM
# - max_mb: hard cap
# - min_mb: hard floor (0 disables)
lab-node-01_zram_size_percent: 25
lab-node-01_zram_max_mb: 8192
lab-node-01_zram_min_mb: 512

# Compression algorithm (kernel-supported): zstd, lz4, etc.
lab-node-01_zram_compression_algorithm: zstd

# Swap priority (higher than disk swap, lower than RAM).
lab-node-01_zram_swap_priority: 100

# Path used by systemd-zram-generator.
lab-node-01_zram_generator_conf_path: /etc/systemd/zram-generator.conf

