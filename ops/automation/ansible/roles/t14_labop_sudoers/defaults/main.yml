---
# Opt-in: writing sudoers is sensitive; keep disabled by default.
lab-node-01_labop_sudoers_enable: false

# Target sudoers include path.
lab-node-01_labop_sudoers_include_path: /etc/sudoers.d/labop-host-report

# User allowed to run the host report without a password.
lab-node-01_labop_sudoers_user: "{{ ansible_user | default('leitao') }}"

# Absolute repo path on the host (no ~ expansion in sudoers).
lab-node-01_labop_repo_path: "/home/{{ lab-node-01_labop_sudoers_user }}/Projects/dev/data-boar"

