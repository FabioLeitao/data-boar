---
# Snapper — BTRFS snapshot automation for LAB-NODE-01 lab node.
# IMPORTANT: snapper only works on btrfs subvolumes.
# This role skips gracefully if the filesystem is not btrfs.

# Enable/disable the role entirely.
lab-node-01_snapper_enabled: true

# Subvolume to protect (default: root — requires root on btrfs).
lab-node-01_snapper_config_name: "root"
lab-node-01_snapper_subvolume: "/"

# Snapshot schedule (systemd timer — snapper ships timeline timers).
lab-node-01_snapper_timeline_create: true
lab-node-01_snapper_timeline_cleanup: true

# How many snapshots to keep in each category.
lab-node-01_snapper_timeline_limit_hourly:  "5"
lab-node-01_snapper_timeline_limit_daily:   "7"
lab-node-01_snapper_timeline_limit_weekly:  "2"
lab-node-01_snapper_timeline_limit_monthly: "2"
lab-node-01_snapper_timeline_limit_yearly:  "1"