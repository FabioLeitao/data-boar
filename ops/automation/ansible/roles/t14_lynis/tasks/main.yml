---
- name: Ensure lynis package is installed
  when: lab-node-01_lynis_install | bool
  ansible.builtin.apt:
    name: lynis
    state: present
    update_cache: false
  failed_when: false

- name: Ensure git is installed (for upstream clone)
  when: lab-node-01_lynis_clone_upstream | bool
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: false

- name: Ensure upstream directory exists
  when: lab-node-01_lynis_clone_upstream | bool
  ansible.builtin.file:
    path: "{{ lab-node-01_lynis_upstream_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Clone Lynis upstream repo (best-effort)
  when: lab-node-01_lynis_clone_upstream | bool
  ansible.builtin.git:
    repo: "{{ lab-node-01_lynis_upstream_repo }}"
    dest: "{{ lab-node-01_lynis_upstream_dir }}"
    version: "{{ lab-node-01_lynis_upstream_ref }}"
    update: true
  failed_when: false

- name: Install Lynis wrapper scripts (best-effort)
  when: lab-node-01_lynis_install_wrappers | bool
  ansible.builtin.copy:
    dest: "{{ lab-node-01_lynis_wrapper_dir }}/{{ item.name }}"
    owner: root
    group: root
    mode: "0755"
    content: "{{ item.content }}"
  loop:
    - name: lynis-upstream
      content: |
        #!/bin/sh
        set -eu
        exec "{{ lab-node-01_lynis_upstream_dir }}/lynis" "$@"
    - name: lynis-labop
      content: |
        #!/bin/sh
        set -eu
        if [ -x "{{ lab-node-01_lynis_upstream_dir }}/lynis" ]; then
          exec "{{ lab-node-01_lynis_upstream_dir }}/lynis" "$@"
        fi
        exec lynis "$@"
  failed_when: false

- name: Write /etc/lynis/default.prf (comment-only suggestions)
  when: lab-node-01_lynis_profile_write | bool
  ansible.builtin.template:
    src: default.prf.j2
    dest: "{{ lab-node-01_lynis_default_prf_path }}"
    owner: root
    group: root
    mode: "0644"
  failed_when: false

