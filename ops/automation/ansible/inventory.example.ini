# --- Pick ONE [lab-node-01] target (copy to inventory.local.ini; do not commit). ---
#
# A) Playbook runs ON this machine (same shell as leitao) — use local connection:
# [lab-node-01]
# localhost ansible_connection=local
#
# B) Playbook runs from another host and reaches the LAB-NODE-01 over SSH:
# [lab-node-01]
# lab-node-01 ansible_host=CHANGEME ansible_user=CHANGEME
#
# Placeholder (replace with A or B):
[lab-node-01]
example-host ansible_host=CHANGEME ansible_user=CHANGEME

# Optional — hosts that run deploy/lab-smoke-stack (Data Boar lab smoke). Used by
# playbooks/lab-smoke-stack-init-perms.yml (chmod init SQL after SCP).
# [lab_smoke]
# lab-node-02 ansible_host=CHANGEME ansible_user=leitao

# Optional — Debian/Ubuntu hosts where you mount CIFS/NFS/sshfs for `type: filesystem`
# or NFS mount-before-scan; used by playbooks/lab-data-boar-share-clients.yml (cifs-utils, nfs-common, sshfs, fuse3).
# [lab_share_clients]
# lab-node-01 ansible_host=CHANGEME ansible_user=CHANGEME

# Optional — set false to skip Docker CE (default in lab-node-01-baseline.yml is true).
# [lab-node-01:vars]
# lab-node-01_install_docker_ce=false
# Optional — disable Swarm (default is true: single-node manager for docker service / stack).
# lab-node-01_docker_swarm_init=false
# Optional — explicit human login for supplementary groups + Bitwarden bw verify (avoids root on localhost / sudo ansible-playbook).
# lab-node-01_operator_target_user=leitao
# Optional — lock toolColleague-Nn binaries to root:comp (0754); see role lab-node-01_toolColleague-Nn_restrict + collections/requirements.yml if using ACL extras.
# lab-node-01_toolColleague-Nn_restrict_enabled=true
# Optional — sshd profile: dev (forwarding on) vs strict (no TCP/agent forwarding).
# lab-node-01_sshd_profile=strict
# Optional — extra users for supplementary groups (docker, wireshark, …); JSON in .ini or group_vars YAML.
# lab-node-01_operator_group_users_extra=["otheruser"]
# Legacy alias still merged by lab-node-01_operator_supplementary_groups:
# lab-node-01_docker_socket_group_users_extra=["otheruser"]

[all:vars]
ansible_python_interpreter=/usr/bin/python3
