---
# Minimal Podman install for LAB-NODE-01 (LMDE / Debian) — use when full baseline is too heavy
# or Docker CE is misconfigured but you need Podman for LAB completão.
#
# From LAB-NODE-01 (inventory with localhost + connection=local):
#   cd ~/Projects/dev/data-boar/ops/automation/ansible
#   ansible-playbook -i inventory.local.ini --ask-become-pass playbooks/lab-node-01-podman.yml --diff
#
# From Windows (repo root):
#   .\scripts\lab-node-01-ansible-baseline.ps1 -SshHost lab-node-01 -Apply -SkipCheck -PodmanOnly
# Non-interactive (narrow sudoers LABOP_ANSIBLE_PODMAN — see LAB_OP_PRIVILEGED_COLLECTION.md):
#   .\scripts\lab-node-01-ansible-baseline.ps1 -SshHost lab-node-01 -Apply -SkipCheck -PodmanOnly -NoAskBecomePass
#   # then on LAB-NODE-01 run only this play, or add a dedicated wrapper script if needed.
- name: LAB-NODE-01 Podman only (rootless stack)
  hosts: lab-node-01
  become: true
  environment: "{{ labop_debian_unattended_apt_environment | combine(lab-node-01_play_apt_environment_extra | default({})) }}"
  vars:
    lab-node-01_play_apt_environment_extra: {}
    lab-node-01_install_podman: true
  roles:
    - role: lab-node-01_podman
