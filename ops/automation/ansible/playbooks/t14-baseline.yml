---
- name: LAB-NODE-01 baseline (LMDE 7) - safe defaults
  hosts: lab-node-01
  become: true
  # Uses group_vars/all.yml — apt-listbugs + unattended apt (see README + tests/test_ansible_playbooks_unattended_apt.py).
  environment: "{{ labop_debian_unattended_apt_environment | combine(lab-node-01_play_apt_environment_extra | default({})) }}"
  vars:
    # Optional extra env for this play only (e.g. proxy). Merged over labop_debian_unattended_apt_environment.
    lab-node-01_play_apt_environment_extra: {}

    # Profile presets: "lab_op_fixed" (desk-bound) vs "roaming" (untrusted networks)
    # The playbook stays safe-default: do not change remote access posture unless you opt-in.
    host_profile: lab_op_fixed

    # --- Containers (defaults tuned for dev workstation + ctop; override in inventory to disable) ---
    # Docker CE (official Docker repo) + Compose plugin — so `docker`/`ctop` work without manual apt
    lab-node-01_install_docker_ce: true
    lab-node-01_docker_install_compose_plugin: true
    # Docker Swarm (single-node manager) — enables `docker service` / `docker stack deploy`
    lab-node-01_docker_swarm_init: true
    # Podman (rootless containers, OCI-compatible) — lab smokes / completão may use alongside Docker CE
    lab-node-01_install_podman: true
    # k3s (lightweight Kubernetes — installs from get.k3s.io; opt-in deliberately)
    lab-node-01_install_k3s: false

    # --- Opt-in knobs (observability) ---
    # Install CLI tools (iotop, iftop, ctop, munin-node, monit, node_exporter) — safe default: true
    lab-node-01_obs_install_cli_tools: true
    lab-node-01_obs_install_ctop: true
    # Syslog forwarding to central server (set IP in group_vars/host_vars, never committed)
    lab-node-01_obs_syslog_forward_enabled: false
    lab-node-01_obs_syslog_server_ip: ""
    # Munin node (expose to Munin master)
    lab-node-01_obs_munin_node_enabled: true
    lab-node-01_obs_munin_allowed_ips: []
    # Monit (local process supervision)
    lab-node-01_obs_monit_enabled: true
    lab-node-01_obs_monit_web_enabled: false
    # Prometheus node_exporter
    lab-node-01_obs_node_exporter_enabled: true
    # Wazuh SIEM agent (requires manager IP; off by default until lab is ready)
    lab-node-01_obs_wazuh_agent_enabled: false
    lab-node-01_obs_wazuh_manager_ip: ""

    # Bitwarden CLI: not in Debian main. Role lab-node-01_bitwarden_cli installs npm -g @bitwarden/cli, PATH for tmux,
    # fixes docker.list perms if present, and asserts /usr/local/bin/bw exists before the play continues.
    lab-node-01_install_bitwarden_cli: true

    # --- Opt-in knobs (snapshots / btrfs) ---
    # Snapper: automatic BTRFS snapshots (skips gracefully if root is not btrfs)
    lab-node-01_snapper_enabled: true
    lab-node-01_snapper_timeline_limit_hourly: "5"
    lab-node-01_snapper_timeline_limit_daily: "7"

    # sshd LAB-OP drop-in: dev = TCP/agent forwarding on; strict = no forwarding (closer to locked laptop).
    lab-node-01_sshd_profile: dev

  roles:
    # --- System baseline ---
    - role: lab-node-01_baseline_packages
    # Bitwarden CLI early: fail fast if bw cannot be installed (rest of baseline assumes optional secret workflow).
    - role: lab-node-01_bitwarden_cli
    - role: lab-node-01_banners
    - role: lab-node-01_sshd_labop
    - role: lab-node-01_editor_defaults
    - role: lab-node-01_lynis
    - role: lab-node-01_ufw
    - role: lab-node-01_fail2ban
    - role: lab-node-01_unattended_upgrades
    - role: lab-node-01_etckeeper
    - role: lab-node-01_login_defs
    - role: lab-node-01_shell_umask
    - role: lab-node-01_limits_labop
    - role: lab-node-01_sshguard
    - role: lab-node-01_usbguard
    - role: lab-node-01_labop_sudoers
    - role: lab-node-01_snmpd_v3_only
    - role: lab-node-01_aide
    - role: lab-node-01_auditd
    - role: lab-node-01_zram
    # --- Containers: Podman before Docker CE so a partial Docker/apt failure still leaves Podman
    # (LAB completão / variety path). Docker CE remains default for ctop/Swarm per play vars.
    - role: lab-node-01_podman
    - role: lab-node-01_docker_ce
    - role: lab-node-01_operator_supplementary_groups
    - role: lab-node-01_k3s
    # --- Observability (progressive opt-in) ---
    - role: lab-node-01_observability
    # --- Optional: restrict GCC/FPC-style toolColleague-Nn binaries to root + group comp (see role defaults) ---
    - role: lab-node-01_toolColleague-Nn_restrict
    # --- Snapshots (btrfs only, skips gracefully on ext4) ---
    - role: lab-node-01_snapper
      when: lab-node-01_snapper_enabled | bool
