# Docker Compose v3. Compatible with Docker Swarm: deploy with
#   docker stack deploy -c deploy/docker-compose.yml lgpd-audit
# Default: runs the image CMD = web API + frontend (dashboard, reports, config UI) on port 8088.
# No "command:" override = container starts the API. For CLI one-shot use a separate run with entrypoint override.
# Requires: config at /data/config.yaml (mount volume or bind).
# Image: pre-built on Docker Hub (hub.docker.com/r/fabioleitao/data_boar) or override with build: for local build.
#
# Hardening posture (see docs/adr/0044-container-image-hardening-databoar-user.md):
#   - read_only: true so the container filesystem is immutable; writable state lives
#     under the named `lgpd-data` volume mounted at /data and a tmpfs at /tmp.
#   - cap_drop: ALL — Data Boar does not need any Linux capability for HTTP serving
#     or read-only sampling. cap_add stays empty by design.
#   - security_opt: no-new-privileges:true — kernel-level mitigation against
#     privilege escalation via setuid binaries inside the image.
#   - user: "1000:1000" — pinned even though the image already runs as `databoar`,
#     so Swarm / k8s deployments cannot accidentally re-root the process.
#   - pids_limit + ulimits.nofile — soft limits to bound runaway exhaustion (12-factor).
#
# Resources: tuned for I/O-bound workload (network/FS are the bottleneck). CPU left
# unconstrained for report-generation bursts.
version: "3.8"

services:
  lgpd-audit:
    image: fabioleitao/data_boar:latest
    # command not set: use image default = web API + frontend
    build:
      context: ..
      dockerfile: Dockerfile
    user: "1000:1000"
    ports:
      - "8088:8088"
    environment:
      CONFIG_PATH: /data/config.yaml
    volumes:
      - lgpd-data:/data
    # Immutable root filesystem. Writable state must be on volumes or tmpfs.
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Bounded runtime budget — not a substitute for application-level caps in
    # connectors/sql_sampling.py, but a kernel-side relief valve.
    pids_limit: 256
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
          cpus: "0.25"

volumes:
  lgpd-data:
