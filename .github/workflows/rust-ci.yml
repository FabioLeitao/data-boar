# Rust prefilter crate (boar_fast_filter): check, test, clippy on push/PR to main.
# Clippy uses -D warnings so any lint is a hard failure.
#
# Why a separate workflow (vs folding into ci.yml):
#   - The Python suite already covers Python code; mixing toolColleague-Nns slows
#     diagnostics. A standalone Rust workflow gives crisp red/green for the
#     crate without inflating the unrelated Python matrix.
#   - `paths:` filter means the workflow only burns runner minutes when
#     rust/ or this YAML actually changes.
#
# Why we leave default features on (no --no-default-features):
#   pyo3 0.23 with the `extension-module` feature does NOT link libpython at
#   build time (see pyo3 docs: "extension-module"). That is exactly why the
#   crate can build and test on a vanilla GitHub runner without a Python dev
#   header install. Stripping the feature would force libpython linkage.
#
# Third-party Actions use full commit SHAs (Dependabot can refresh github-actions).
name: Rust CI

permissions:
  contents: read

# YAML keyword `on` is quoted because some YAML libraries / linters parse the
# unquoted `on` as the boolean true. The repository pre-commit / pytest guards
# parse this file with PyYAML which is tolerant; the quoted form is portable.
'on':
  push:
    branches: [main, master]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  # Manual reruns from the Actions UI without changing rust/ files.
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same branch/PR.
# `main` keeps every run for audit; feature branches collapse to the latest.
concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: cargo (check, test, clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/boar_fast_filter
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolColleague-Nn
        uses: dtolnay/rust-toolColleague-Nn@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolColleague-Nn: stable
          components: clippy, rustfmt

      # Cache the registry, git checkouts, and target dir keyed on Cargo.lock
      # so subsequent runs only recompile the crate itself, not the dependency
      # graph (PyO3 + regex pull a non-trivial set). Eviction follows GitHub's
      # cache LRU; restore-keys broaden the hit window across lock bumps.
      - name: Cache cargo registry and target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/boar_fast_filter/target
          key: ${{ runner.os }}-cargo-boar-fast-filter-${{ hashFiles('rust/boar_fast_filter/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-boar-fast-filter-

      - name: cargo check
        run: cargo check --verbose

      - name: cargo test
        run: cargo test --verbose

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check
