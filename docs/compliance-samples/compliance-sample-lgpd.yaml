recommendation_overrides:
  - norm_tag_pattern: "PII_AMBIGUOUS"
    base_legal: "Identificador genérico – confirmar manualmente"
    risk: "Nome de coluna genérico (doc_id, document_id, id_number, etc.). Pode ser PII ou ID interno."
    recommendation: "Confirmar manualmente: verificar se a coluna contém dado pessoal (PII) ou apenas identificador interno. Se for PII, aplicar controles e base legal; se interno, prioridade MÉDIA."
    priority: "MÉDIA"
    relevant_for: "Operador, DPO, Segurança da Informação"
  - norm_tag_pattern: "LGPD Art. 5"
    base_legal: "LGPD Art. 5 (dados pessoais); Lei 13.709/2018"
    risk: "Identificação de pessoa natural."
    recommendation: "Aplicar bases legais e medidas de segurança da LGPD; tratar conforme finalidade e necessidade."
    priority: "ALTA"
    relevant_for: "DPO, Encarregado LGPD"
