recommendation_overrides:
  - norm_tag_pattern: "US HR 8250 Parents Decide Act"
    base_legal: "U.S. H.R. 8250 (Parents Decide Act) / companion App Store Accountability Act — bill INTRODUCED in the 119th Congress, NOT enacted; FTC implementing rules pending. Technical mapping only; not a compliance determination."
    risk: "Fields or content may relate to parental-consent records, operating-system or app-store age signals, or device-to-guardian linkage that the bill, if enacted, would regulate. The tool does NOT verify age, does NOT enforce parental consent, and does NOT determine bill applicability. Statutory text and any final FTC rules may differ from the introduced version."
    recommendation: "Inventory existing parental-consent artefacts, age-verification logs, app-store account metadata, and any device-to-guardian linkage data. Coordinate with privacy counsel and the DPO on (a) preparedness scenarios should H.R. 8250 (or a successor) be enacted, (b) overlap with COPPA, CA AB 2273, CO CPA minors, and state app-store laws, and (c) data-minimisation, retention, and access-control posture for minor-linked records. Use findings strictly as technical inventory input; do not treat outputs as legal sign-off or as a substitute for FTC-aligned implementation guidance."
    priority: "ALTA"
    relevant_for: "DPO, privacy counsel, federal-affairs / public-policy teams, product / OS / app-store engineering leads tracking U.S. minors-online legislation"
